name: Update Google Scholar Stats

on:
  schedule:
    # 每3小时更新一次（北京时间: 00:00/03:00/06:00/09:00/12:00/15:00/18:00/21:00）
    # GitHub Actions cron uses UTC: 16:00/19:00/22:00/01:00/04:00/07:00/10:00/13:00
    - cron: '0 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
    inputs:
      citation_floor:
        description: "Optional manual citation floor"
        required: false
        default: ""

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd google_scholar_crawler
          pip install -r requirements.txt

      - name: Update Google Scholar stats
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID || 'r9f4mLMAAAAJ' }}
          SCHOLAR_CITATION_FLOOR: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.citation_floor || '' }}
        run: |
          cd google_scholar_crawler
          python main.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update Google Scholar stats" && git push)
