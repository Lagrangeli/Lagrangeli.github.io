name: Update Google Scholar Stats

on:
  schedule:
    # 每3小时更新一次（北京时间: 00:00/03:00/06:00/09:00/12:00/15:00/18:00/21:00）
    # GitHub Actions cron uses UTC: 16:00/19:00/22:00/01:00/04:00/07:00/10:00/13:00
    - cron: '0 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
    inputs:
      citation_floor:
        description: "Optional manual citation floor"
        required: false
        default: ""

permissions:
  contents: write
  pages: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd google_scholar_crawler
          pip install -r requirements.txt

      - name: Update Google Scholar stats
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID || 'r9f4mLMAAAAJ' }}
          SCHOLAR_CITATION_FLOOR: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.citation_floor || '' }}
        run: |
          cd google_scholar_crawler
          python main.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto update Google Scholar stats"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger GitHub Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
